<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Google+Sans+Code:ital,wght@0,300..800;1,300..800&family=Pixelify+Sans:wght@400..700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <header>
            <h1 class="pixelfont">sky-16</h1>
            <h2>Official Emulation Software</h2>
        </header>
        <hr />
        <main>
            <p>ASSEMBLY (1 instruction per cycle)</p>
            <textarea id="asm" name="asm" rows="30" cols="50"></textarea>
            <hr />

            <p></p>
            <p>EXCECUTION</p>
            <textarea
                id="stdout"
                name="stdout"
                rows="10"
                cols="50"
                readonly
            ></textarea>
            <button class="btn">START</button>
            <button class="btn">PAUSE</button>
            <button class="btn">STEP</button>
            <button class="btn">RESET</button>
        </main>
    </body>
</html>
